# Ralph loop (https://github.com/snarktank/ralph) — each agent runs in a fresh
# session with clean context. Memory persists via git history and progress files.
id: feature-dev
name: Feature Development Workflow
version: 5
description: |
  Story-based execution pipeline. Planner decomposes tasks into user stories.
  Setup prepares the environment and establishes baseline.
  Developer implements each story (with tests) in a fresh session. Verifier checks each story.
  Then integration/E2E testing, PR creation, and code review.

polling:
  model: default
  timeoutSeconds: 120

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Decomposes tasks into ordered user stories.
    workspace:
      baseDir: agents/planner
      files:
        AGENTS.md: agents/planner/AGENTS.md
        SOUL.md: agents/planner/SOUL.md
        IDENTITY.md: agents/planner/IDENTITY.md

  - id: setup
    name: Setup
    role: coding
    description: Prepares environment, creates branch, establishes baseline.
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: ../../agents/shared/setup/AGENTS.md
        SOUL.md: ../../agents/shared/setup/SOUL.md
        IDENTITY.md: ../../agents/shared/setup/IDENTITY.md

  - id: developer
    name: Developer
    role: coding
    description: Implements features, writes tests, creates PRs.
    workspace:
      baseDir: agents/developer
      files:
        AGENTS.md: agents/developer/AGENTS.md
        SOUL.md: agents/developer/SOUL.md
        IDENTITY.md: agents/developer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Quick sanity check - did developer actually do the work?
    workspace:
      baseDir: agents/verifier
      skills:
        - agent-browser
      files:
        AGENTS.md: ../../agents/shared/verifier/AGENTS.md
        SOUL.md: ../../agents/shared/verifier/SOUL.md
        IDENTITY.md: ../../agents/shared/verifier/IDENTITY.md

  - id: tester
    name: Tester
    role: testing
    description: Integration and E2E testing after all stories are implemented.
    workspace:
      baseDir: agents/tester
      files:
        AGENTS.md: agents/tester/AGENTS.md
        SOUL.md: agents/tester/SOUL.md
        IDENTITY.md: agents/tester/IDENTITY.md

  - id: reviewer
    name: Reviewer
    role: analysis
    description: Reviews PRs, requests changes or approves.
    workspace:
      baseDir: agents/reviewer
      skills:
        - agent-browser
      files:
        AGENTS.md: agents/reviewer/AGENTS.md
        SOUL.md: agents/reviewer/SOUL.md
        IDENTITY.md: agents/reviewer/IDENTITY.md

steps:
  - id: plan
    agent: planner
    input: |
      Plan this task into ordered, executable user stories.

      TASK:
      {{task}}

      Instructions:
      1. Explore the repo and follow existing conventions.
      2. Split into small stories (max 20), ordered by dependency.
      3. Each story must fit in one developer session.
      4. Acceptance criteria must be mechanically verifiable.
      5. Include "Tests for [feature] pass" in each story.
      6. End each story criteria with "Typecheck passes".
      7. Determine REPO from TASK using this priority:
         - If TASK contains "Repository path: <absolute path>", use that exact path.
         - Else if TASK contains an absolute path (for example "/Users/..."), use that path.
         - Else use the existing REPO context if provided.
      8. If TASK includes an explicit absolute repo path, REPO MUST be that exact path. Never replace it with your current workspace path.
      10. Output a UNIQUE branch name for this run. Never reuse an existing long-lived branch.
      11. Branch format must include a timestamp and short suffix, for example:
         feat/<short-topic>-{{YYYYMMDD-HHMMSS}}-<4to6char>

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      BRANCH: feature-branch-name
      STORIES_JSON: [ ... array of story objects ... ]
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup
    agent: setup
    input: |
      Prepare the repo baseline for this feature.

      TASK:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}

      Instructions:
      1. Resolve FINAL_REPO from TASK using this priority:
         - If TASK contains "Repository path: <absolute path>", FINAL_REPO = that exact path.
         - Else if TASK contains an absolute path (for example "/Users/..."), FINAL_REPO = that path.
         - Else FINAL_REPO = REPO.
      3. Never run git/build/test in any repo other than FINAL_REPO.
      4. Start from main (or project default base) and pull latest.
      5. Attempt to create/use branch {{branch}}.
      6. If {{branch}} already exists (local or remote), auto-generate a NEW unique branch by appending a timestamp and short suffix, then use that branch instead.
      7. Detect build/test commands from project config and CI files.
      8. Ensure required hygiene files exist (.gitignore, etc.).
      9. Run baseline build and test.
      10. Report commands, baseline status, FINAL repo, and the FINAL branch actually used.

      Reply with:
      STATUS: done
      REPO: <final-repo-path-used>
      BRANCH: <final-branch-name-used>
      BUILD_CMD: <build command>
      TEST_CMD: <test command>
      CI_NOTES: <brief CI notes>
      BASELINE: <baseline status>
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: implement
    agent: developer
    type: loop
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
    input: |
      Implement ONE story in a fresh session.

      TASK (overall):
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      CURRENT STORY:
      {{current_story}}

      COMPLETED STORIES:
      {{completed_stories}}

      STORIES REMAINING: {{stories_remaining}}

      VERIFY FEEDBACK (if retrying):
      {{verify_feedback}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Work only on CURRENT STORY and its acceptance criteria.
      2. Use local Codex CLI as the primary coding engine for implementation.
      3. If VERIFY FEEDBACK exists, address every issue before resubmitting.
      4. Write/adjust tests for this story.
      5. Run typecheck/build and full tests.
      6. Commit with: feat: {{current_story_id}} - {{current_story_title}}.
      7. Rewrite progress-{{run_id}}.txt with story results and reusable patterns.

      Reply with:
      STATUS: done
      CHANGES: what you implemented
      TESTS: what tests you wrote
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Verify this story implementation.

      TASK (overall):
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      CHANGES: {{changes}}
      TEST_CMD: {{test_cmd}}

      CURRENT STORY:
      {{current_story}}

      PROGRESS LOG:
      {{progress}}

      Check:
      1. Each acceptance criterion in CURRENT STORY is satisfied.
      2. Tests for this story exist and are meaningful.
      3. Run {{test_cmd}} and confirm pass.
      4. Confirm typecheck/build passes.
      5. Confirm no obvious incomplete work.

      ## Visual Verification (Frontend Changes)
      Has frontend changes: {{has_frontend_changes}}

      If {{has_frontend_changes}} is 'true', also do visual verification with agent-browser:
      1. Open changed UI (file URL or local server).
      2. Capture screenshot.
      3. Confirm layout/styling/visibility are correct.
      4. Include visual findings in VERIFIED.

      If {{has_frontend_changes}} is 'false', skip visual verification entirely.

      Reply with:
      STATUS: done
      VERIFIED: What you confirmed

      Or if incomplete:
      STATUS: retry
      ISSUES:
      - What's missing or incomplete
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: test
    agent: tester
    input: |
      Run integration/E2E validation for the completed feature.

      TASK:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      CHANGES: {{changes}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Run full suite: {{test_cmd}}.
      2. Check integration between stories.
      3. If UI exists, run end-to-end browser checks.
      4. Check cross-cutting behavior (errors, edge cases).
      5. Confirm feature works as a cohesive whole.

      Reply with:
      STATUS: done
      RESULTS: What you tested and the outcomes

      Or if issues found:
      STATUS: retry
      FAILURES:
      - Specific test failures or bugs found
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: pr
    agent: developer
    input: |
      Create the code review submission (GitHub PR or GitLab MR).

      TASK:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      CHANGES: {{changes}}
      RESULTS: {{results}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Detect host from `git remote get-url origin`.
      2. Prefer `gh pr create` (GitHub) or `glab mr create` (GitLab).
      3. If CLI auth is unavailable: push branch, generate manual PR/MR URL, return notes.
      4. Do not fail solely due to missing hosting CLI auth when manual fallback works.

      Reply with:
      STATUS: done
      PR: URL to the pull request / merge request (or manual creation URL)
      PROVIDER: github|gitlab
      SUBMISSION_MODE: auto|manual
      SUBMISSION_NOTES: short note (e.g., used gh/glab, or pushed branch and provided manual URL)
    expects: "STATUS: done"
    on_fail:
      escalate_to: human

  - id: review
    agent: reviewer
    input: |
      Review the submitted change (GitHub PR or GitLab MR).

      PR: {{pr}}
      TASK: {{task}}
      CHANGES: {{changes}}
      PROVIDER: {{provider}}
      SUBMISSION_MODE: {{submission_mode}}
      SUBMISSION_NOTES: {{submission_notes}}

      PROGRESS LOG:
      {{progress}}

      Review goals:
      - Correctness and bug risk
      - Test coverage and reliability
      - Project convention alignment

      Instructions:
      1. Detect host from `git remote get-url origin`.
      2. If PR/MR URL is actionable, review via gh/glab CLI.
      3. If manual URL or no auth, do local diff review on {{branch}}.
      4. Return decision plus actionable feedback.

      ## Visual Review (Frontend Changes)
      Has frontend changes: {{has_frontend_changes}}

      If {{has_frontend_changes}} is 'true', do visual design review:
      1. Checkout {{branch}} and open changed UI.
      2. Capture screenshot.
      3. Evaluate polish, consistency, alignment, and interaction clarity.
      4. Include visual assessment in output.

      If {{has_frontend_changes}} is 'false', skip visual review entirely.

      If changes needed, add comments to the PR explaining what needs to change.

      Reply with:
      STATUS: done
      DECISION: approved

      Or if changes needed:
      STATUS: retry
      DECISION: changes_requested
      FEEDBACK:
      - What needs to change
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 3
      on_exhausted:
        escalate_to: human
